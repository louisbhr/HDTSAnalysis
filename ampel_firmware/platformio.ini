; ============================================================================
;  HDTS-Ampel  -  ESP32 Firmware (PlatformIO)
; ============================================================================
;  Board:  Standard ESP32 DevKit (ESP32-D0WD-V3 / WROOM-32)
;  Aufgabe: 15 Anzeige-LEDs (WS2812B-Streifen) + 1 Status-LED + 1 Schalter
;
;  Falls dein COM-Port nicht 10 ist, einfach unten anpassen oder die Zeilen
;  upload_port / monitor_port ganz weglassen (PlatformIO sucht dann selbst).
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 460800

; --- optional: feste Ports (auskommentieren, wenn PlatformIO selbst suchen soll) ---
; upload_port = COM10
; monitor_port = COM10

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
